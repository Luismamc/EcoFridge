<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EcoFridge</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #16a34a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p { font-size: 14px; opacity: 0.8; text-align: center; max-width: 300px; }
    .error { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin-top: 20px; display: none; }
    .error h2 { font-size: 18px; margin-bottom: 8px; }
    .error p { font-size: 12px; opacity: 0.9; }
    #status { font-size: 13px; margin-top: 16px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>🧊 EcoFridge</h1>
  <p>Cargando tu asistente de alimentos...</p>
  <div id="status"></div>
  <div class="error" id="errorBox">
    <h2>⚠️ Sin conexión</h2>
    <p>Se necesita conexión a internet para usar EcoFridge. Por favor, verifica tu conexión e intenta de nuevo.</p>
  </div>
  <script>
    // Si estamos en Capacitor con server URL, esperar a que cargue
    // Si estamos en modo local (sin server.url), mostrar error después de un timeout
    setTimeout(function() {
      var status = document.getElementById('status');
      if (status && !window.location.href.includes('ecofridge')) {
        // Podría estar cargando, esperar más
      }
    }, 5000);

    setTimeout(function() {
      var errorBox = document.getElementById('errorBox');
      if (errorBox && !navigator.onLine) {
        errorBox.style.display = 'block';
        document.querySelector('.spinner').style.display = 'none';
      }
    }, 10000);
  </script>
</body>
</html>
